<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Sentiment Analysis</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 700px;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        textarea {
            resize: none;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        .result {
            text-align: center;
            margin-top: 20px;
            font-size: 28px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="card">

    <h1>🤖 AI Sentiment Analysis</h1>

    <form method="POST">

        <div class="mb-3">
            <textarea
                class="form-control"
                rows="5"
                name="text"
                placeholder="Enter your review or opinion here..."
                required></textarea>
        </div>

        <div class="d-grid">
            <button class="btn btn-primary btn-lg">
                Analyze Sentiment
            </button>
        </div>

    </form>

    {% if confidence %}
<div class="text-center mt-3">
    <h4>Confidence: {{ confidence }}%</h4>
</div>
{% endif %}

</div>

</body>
</html>
